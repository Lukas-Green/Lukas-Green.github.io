<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildFlow AI — Construction Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #FFF7ED; }
  .tab-active { border-bottom: 3px solid #EA580C; color: #EA580C; font-weight: 600; }
  .tab-btn { transition: all .15s; }
  .tab-btn:hover { background: #FFF7ED; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .modal-overlay { background: rgba(0,0,0,0.4); }
  .fade-in { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body class="min-h-screen">

<!-- Demo Banner -->
<div class="bg-yellow-50 border-b border-yellow-200 text-yellow-800 text-center text-sm py-2 px-4">
  <span class="font-semibold">Demo mode</span> — simulated project data. Stored locally.
</div>

<!-- Header -->
<header class="text-white px-6 py-4 flex items-center justify-between" style="background:#EA580C;">
  <div>
    <h1 class="text-2xl font-bold tracking-tight">BuildFlow AI</h1>
    <p class="text-orange-100 text-sm">Construction Management</p>
  </div>
  <button onclick="resetData()" class="text-xs bg-white/20 hover:bg-white/30 rounded px-3 py-1">Reset Demo</button>
</header>

<!-- Tabs -->
<nav class="bg-white border-b flex gap-0 px-6">
  <button class="tab-btn px-5 py-3 text-sm tab-active" data-tab="changeorders" onclick="switchTab('changeorders')">Change Orders</button>
  <button class="tab-btn px-5 py-3 text-sm text-gray-500" data-tab="fieldlog" onclick="switchTab('fieldlog')">Field Log</button>
  <button class="tab-btn px-5 py-3 text-sm text-gray-500" data-tab="estimates" onclick="switchTab('estimates')">Estimates</button>
</nav>

<!-- Tab Content -->
<main class="max-w-6xl mx-auto p-6">

  <!-- ========== CHANGE ORDERS TAB ========== -->
  <section id="tab-changeorders" class="fade-in">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <label class="text-sm text-gray-500 mr-2">Active Project:</label>
        <select id="projectSelect" onchange="renderCO()" class="border rounded px-3 py-1.5 text-sm bg-white">
          <option>Riverside Office Complex</option>
          <option>Harbor View Condos</option>
          <option>Downtown Retail Renovation</option>
        </select>
      </div>
      <button onclick="openCOModal()" class="bg-orange-600 hover:bg-orange-700 text-white text-sm font-medium px-4 py-2 rounded shadow">+ New Change Order</button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="coSummary"></div>

    <!-- CO Table -->
    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-600 text-left">
          <tr>
            <th class="px-4 py-3">CO#</th>
            <th class="px-4 py-3">Description</th>
            <th class="px-4 py-3">Reason</th>
            <th class="px-4 py-3 text-right">Cost Impact</th>
            <th class="px-4 py-3 text-center">Schedule</th>
            <th class="px-4 py-3 text-center">Status</th>
            <th class="px-4 py-3 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="coTableBody"></tbody>
      </table>
      <div id="coEmpty" class="hidden text-center text-gray-400 py-8 text-sm">No change orders for this project.</div>
    </div>
  </section>

  <!-- ========== FIELD LOG TAB ========== -->
  <section id="tab-fieldlog" class="hidden fade-in">
    <div class="bg-white rounded-lg shadow p-5 mb-4">
      <div class="flex flex-wrap items-center gap-3 mb-4">
        <label class="text-sm text-gray-500">Role:</label>
        <select id="roleSelect" class="border rounded px-3 py-1.5 text-sm bg-white">
          <option>Foreman</option><option>PM</option><option>Superintendent</option>
        </select>
      </div>
      <div class="flex flex-wrap gap-2 mb-4">
        <button onclick="quickMsg('Materials Arrived')" class="text-xs bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1.5">Materials Arrived</button>
        <button onclick="quickMsg('Inspection Passed')" class="text-xs bg-green-50 hover:bg-green-100 text-green-700 rounded-full px-3 py-1.5">Inspection Passed</button>
        <button onclick="quickMsg('Inspection Failed')" class="text-xs bg-red-50 hover:bg-red-100 text-red-700 rounded-full px-3 py-1.5">Inspection Failed</button>
        <button onclick="quickMsg('Weather Delay')" class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-full px-3 py-1.5">Weather Delay</button>
        <button onclick="quickMsg('Need Approval')" class="text-xs bg-yellow-50 hover:bg-yellow-100 text-yellow-700 rounded-full px-3 py-1.5">Need Approval</button>
        <button onclick="quickMsg('Safety Issue')" class="text-xs bg-red-50 hover:bg-red-100 text-red-700 rounded-full px-3 py-1.5">Safety Issue</button>
      </div>
      <div class="flex gap-2">
        <input id="msgInput" type="text" placeholder="Type a message..." class="flex-1 border rounded px-3 py-2 text-sm" onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()" class="bg-orange-600 hover:bg-orange-700 text-white text-sm px-4 py-2 rounded">Send</button>
      </div>
    </div>
    <div id="fieldLogFeed" class="space-y-2"></div>
  </section>

  <!-- ========== ESTIMATES TAB ========== -->
  <section id="tab-estimates" class="hidden fade-in">
    <div class="flex flex-wrap items-center justify-between mb-4 gap-3">
      <h2 class="text-lg font-semibold text-gray-800">Project Estimate</h2>
      <button onclick="aiReview()" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium px-4 py-2 rounded shadow flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19 14.5M14.25 3.104c.251.023.501.05.75.082M19 14.5l-2.47 2.47a2.25 2.25 0 0 1-1.59.659H9.06a2.25 2.25 0 0 1-1.591-.659L5 14.5m14 0V17a2.25 2.25 0 0 1-2.25 2.25H7.25A2.25 2.25 0 0 1 5 17v-2.5"/></svg>
        AI Review
      </button>
    </div>
    <div id="aiReviewBox" class="hidden mb-4 bg-purple-50 border border-purple-200 rounded-lg p-4 text-sm fade-in"></div>
    <div id="estimateBody"></div>

    <!-- Totals -->
    <div class="bg-white rounded-lg shadow p-5 mt-4">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
        <div>
          <label class="text-xs text-gray-500">Subtotal</label>
          <p id="estSubtotal" class="text-lg font-semibold text-gray-800">$0.00</p>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Markup %</label>
          <input id="markupPct" type="number" value="15" min="0" max="100" step="0.5" class="border rounded px-3 py-1.5 text-sm w-24" onchange="calcEstTotals()">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Tax %</label>
          <input id="taxPct" type="number" value="8.25" min="0" max="100" step="0.25" class="border rounded px-3 py-1.5 text-sm w-24" onchange="calcEstTotals()">
        </div>
      </div>
      <div class="border-t pt-3 flex flex-wrap gap-6">
        <div><span class="text-xs text-gray-500">Markup:</span> <span id="estMarkup" class="font-medium">$0.00</span></div>
        <div><span class="text-xs text-gray-500">Tax:</span> <span id="estTax" class="font-medium">$0.00</span></div>
        <div><span class="text-xs text-gray-500">Grand Total:</span> <span id="estGrand" class="text-xl font-bold text-orange-700">$0.00</span></div>
      </div>
    </div>
  </section>
</main>

<!-- Change Order Modal -->
<div id="coModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 p-6 fade-in">
    <div class="flex justify-between items-center mb-5">
      <h3 class="text-lg font-semibold">New Change Order</h3>
      <button onclick="closeCOModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-sm text-gray-600 block mb-1">Description</label>
        <input id="coDesc" type="text" class="w-full border rounded px-3 py-2 text-sm" placeholder="e.g. Add electrical outlets to east wall">
      </div>
      <div>
        <label class="text-sm text-gray-600 block mb-1">Reason</label>
        <select id="coReason" class="w-full border rounded px-3 py-2 text-sm">
          <option>Scope Change</option><option>Unforeseen Condition</option><option>Client Request</option><option>Design Error</option><option>Code Compliance</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-600 block mb-1">Material Cost ($)</label>
          <input id="coMat" type="number" min="0" step="0.01" class="w-full border rounded px-3 py-2 text-sm" value="0" oninput="calcCOTotal()">
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">Labor Cost ($)</label>
          <input id="coLab" type="number" min="0" step="0.01" class="w-full border rounded px-3 py-2 text-sm" value="0" oninput="calcCOTotal()">
        </div>
      </div>
      <div class="bg-orange-50 rounded p-3 text-center">
        <span class="text-xs text-gray-500">Total:</span>
        <span id="coTotal" class="text-lg font-bold text-orange-700 ml-2">$0.00</span>
      </div>
      <div>
        <label class="text-sm text-gray-600 block mb-1">Schedule Impact (days)</label>
        <input id="coDays" type="number" min="0" class="w-full border rounded px-3 py-2 text-sm" value="0">
      </div>
      <div>
        <label class="text-sm text-gray-600 block mb-1">Notes</label>
        <textarea id="coNotes" rows="2" class="w-full border rounded px-3 py-2 text-sm" placeholder="Optional notes..."></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeCOModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
      <button onclick="saveCO()" class="px-4 py-2 text-sm bg-orange-600 hover:bg-orange-700 text-white rounded shadow">Save as Draft</button>
    </div>
  </div>
</div>

<script>
// ===== DATA HELPERS =====
const LS = (k, v) => v !== undefined ? localStorage.setItem(k, JSON.stringify(v)) : JSON.parse(localStorage.getItem(k));
const fmt = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

// ===== SEED DATA =====
function seedData() {
  if (LS('construction_change_orders')) return;

  LS('construction_projects', [
    {name:'Riverside Office Complex', contract:2450000},
    {name:'Harbor View Condos', contract:5800000},
    {name:'Downtown Retail Renovation', contract:980000}
  ]);

  LS('construction_change_orders', [
    {id:1, project:'Riverside Office Complex', desc:'Additional foundation piers — soft soil discovered', reason:'Unforeseen Condition', matCost:18500, labCost:12000, total:30500, days:5, notes:'Geotechnical report recommends 4 additional piers.', status:'Approved'},
    {id:2, project:'Riverside Office Complex', desc:'Upgrade lobby finishes per owner request', reason:'Client Request', matCost:9200, labCost:4800, total:14000, days:3, notes:'Owner selected imported marble tile.', status:'Submitted'},
    {id:3, project:'Harbor View Condos', desc:'Re-route plumbing around existing utility conflict', reason:'Unforeseen Condition', matCost:6700, labCost:8900, total:15600, days:4, notes:'Existing water main not shown on as-builts.', status:'Draft'}
  ]);

  const now = Date.now();
  LS('construction_field_log', [
    {ts: now - 3600000*5, role:'Foreman', msg:'Concrete pour complete on level 2. Finishing crew on standby.'},
    {ts: now - 3600000*4, role:'PM', msg:'Inspection scheduled for tomorrow 8 AM — electrical rough-in.'},
    {ts: now - 3600000*3, role:'Superintendent', msg:'Inspection Passed'},
    {ts: now - 3600000*2, role:'Foreman', msg:'Materials Arrived'},
    {ts: now - 3600000, role:'PM', msg:'Need Approval'},
    {ts: now - 1800000, role:'Superintendent', msg:'Safety Issue'}
  ]);

  LS('construction_estimates', [
    {id:1, cat:'Materials', desc:'Structural Steel (W-shapes)', qty:24, unit:'ea', unitCost:1850},
    {id:2, cat:'Materials', desc:'Ready-Mix Concrete', qty:180, unit:'sf', unitCost:12.50},
    {id:3, cat:'Materials', desc:'Rebar #5', qty:2400, unit:'lf', unitCost:1.85},
    {id:4, cat:'Labor', desc:'Ironworkers', qty:320, unit:'hr', unitCost:78},
    {id:5, cat:'Labor', desc:'Concrete Finishers', qty:160, unit:'hr', unitCost:65},
    {id:6, cat:'Equipment', desc:'Crane Rental (monthly)', qty:2, unit:'ea', unitCost:15000},
    {id:7, cat:'Equipment', desc:'Concrete Pump', qty:3, unit:'ea', unitCost:2800},
    {id:8, cat:'Subcontractor', desc:'Electrical Rough-In', qty:1, unit:'ls', unitCost:145000}
  ]);
}

// ===== TAB SWITCHING =====
function switchTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(s => s.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-gray-500'); });
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  btn.classList.add('tab-active'); btn.classList.remove('text-gray-500');
  if (tab === 'changeorders') renderCO();
  if (tab === 'fieldlog') renderLog();
  if (tab === 'estimates') renderEst();
}

// ===== CHANGE ORDERS =====
function getProjects() { return LS('construction_projects') || []; }
function getCOs() { return LS('construction_change_orders') || []; }
function saveCOs(d) { LS('construction_change_orders', d); }

function renderCO() {
  const proj = document.getElementById('projectSelect').value;
  const projects = getProjects();
  const pData = projects.find(p => p.name === proj) || {contract:0};
  const all = getCOs().filter(c => c.project === proj);
  const approved = all.filter(c => c.status === 'Approved');
  const pending = all.filter(c => c.status === 'Draft' || c.status === 'Submitted');
  const approvedTotal = approved.reduce((s,c) => s + c.total, 0);
  const pendingTotal = pending.reduce((s,c) => s + c.total, 0);

  document.getElementById('coSummary').innerHTML = `
    <div class="bg-white rounded-lg shadow p-4"><p class="text-xs text-gray-500">Original Contract</p><p class="text-lg font-bold text-gray-800">${fmt(pData.contract)}</p></div>
    <div class="bg-white rounded-lg shadow p-4"><p class="text-xs text-gray-500">Approved COs</p><p class="text-lg font-bold text-green-700">${fmt(approvedTotal)}</p></div>
    <div class="bg-white rounded-lg shadow p-4"><p class="text-xs text-gray-500">Current Contract Value</p><p class="text-lg font-bold text-orange-700">${fmt(pData.contract + approvedTotal)}</p></div>
    <div class="bg-white rounded-lg shadow p-4"><p class="text-xs text-gray-500">Pending COs</p><p class="text-lg font-bold text-yellow-600">${fmt(pendingTotal)}</p></div>`;

  const tbody = document.getElementById('coTableBody');
  const empty = document.getElementById('coEmpty');
  if (!all.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  tbody.innerHTML = all.map(c => {
    const stColors = {Draft:'bg-gray-100 text-gray-700', Submitted:'bg-yellow-100 text-yellow-800', Approved:'bg-green-100 text-green-800', Rejected:'bg-red-100 text-red-700'};
    let actions = '';
    if (c.status === 'Draft') actions = `<button onclick="coAction(${c.id},'Submitted')" class="text-xs bg-yellow-500 hover:bg-yellow-600 text-white px-2 py-1 rounded">Submit</button>`;
    if (c.status === 'Submitted') actions = `
      <button onclick="coAction(${c.id},'Approved')" class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded">Approve</button>
      <button onclick="coAction(${c.id},'Rejected')" class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded ml-1">Reject</button>`;
    return `<tr class="border-t hover:bg-orange-50/40">
      <td class="px-4 py-3 font-medium">CO-${String(c.id).padStart(3,'0')}</td>
      <td class="px-4 py-3">${c.desc}</td>
      <td class="px-4 py-3 text-gray-500">${c.reason}</td>
      <td class="px-4 py-3 text-right font-medium">${fmt(c.total)}</td>
      <td class="px-4 py-3 text-center">${c.days > 0 ? '+' + c.days + 'd' : '—'}</td>
      <td class="px-4 py-3 text-center"><span class="badge ${stColors[c.status]}">${c.status}</span></td>
      <td class="px-4 py-3 text-center">${actions}</td>
    </tr>`;
  }).join('');
}

function coAction(id, newStatus) {
  const cos = getCOs();
  const co = cos.find(c => c.id === id);
  if (co) co.status = newStatus;
  saveCOs(cos);
  renderCO();
}

function openCOModal() { document.getElementById('coModal').classList.remove('hidden'); }
function closeCOModal() { document.getElementById('coModal').classList.add('hidden'); }
function calcCOTotal() {
  const m = parseFloat(document.getElementById('coMat').value) || 0;
  const l = parseFloat(document.getElementById('coLab').value) || 0;
  document.getElementById('coTotal').textContent = fmt(m + l);
}

function saveCO() {
  const desc = document.getElementById('coDesc').value.trim();
  if (!desc) { alert('Please enter a description.'); return; }
  const cos = getCOs();
  const newId = cos.length ? Math.max(...cos.map(c=>c.id)) + 1 : 1;
  const m = parseFloat(document.getElementById('coMat').value) || 0;
  const l = parseFloat(document.getElementById('coLab').value) || 0;
  cos.push({
    id: newId, project: document.getElementById('projectSelect').value,
    desc, reason: document.getElementById('coReason').value,
    matCost: m, labCost: l, total: m + l,
    days: parseInt(document.getElementById('coDays').value) || 0,
    notes: document.getElementById('coNotes').value.trim(), status: 'Draft'
  });
  saveCOs(cos);
  closeCOModal();
  ['coDesc','coNotes'].forEach(id => document.getElementById(id).value = '');
  ['coMat','coLab','coDays'].forEach(id => document.getElementById(id).value = '0');
  document.getElementById('coTotal').textContent = '$0.00';
  renderCO();
}

// ===== FIELD LOG =====
function getLog() { return LS('construction_field_log') || []; }
function saveLog(d) { LS('construction_field_log', d); }

function renderLog() {
  const log = getLog().sort((a,b) => b.ts - a.ts);
  const feed = document.getElementById('fieldLogFeed');
  if (!log.length) { feed.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">No messages yet.</p>'; return; }

  const roleColors = {Foreman:'bg-orange-100 text-orange-800', PM:'bg-blue-100 text-blue-800', Superintendent:'bg-green-100 text-green-800'};
  feed.innerHTML = log.map(m => {
    const d = new Date(m.ts);
    const time = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return `<div class="bg-white rounded-lg shadow px-4 py-3 flex items-start gap-3 fade-in">
      <span class="badge ${roleColors[m.role]} mt-0.5 shrink-0">${m.role}</span>
      <div class="flex-1"><p class="text-sm text-gray-800">${escHtml(m.msg)}</p><p class="text-xs text-gray-400 mt-1">${time}</p></div>
    </div>`;
  }).join('');
}

function quickMsg(text) {
  const role = document.getElementById('roleSelect').value;
  const log = getLog();
  log.push({ts: Date.now(), role, msg: text});
  saveLog(log);
  renderLog();
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  quickMsg(text);
  input.value = '';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== ESTIMATES =====
const CATS = ['Materials','Labor','Equipment','Subcontractor'];
const UNITS = ['ea','sf','lf','hr','ls'];

function getEst() { return LS('construction_estimates') || []; }
function saveEst(d) { LS('construction_estimates', d); }

function renderEst() {
  const items = getEst();
  const container = document.getElementById('estimateBody');
  container.innerHTML = CATS.map(cat => {
    const catItems = items.filter(i => i.cat === cat);
    const subtotal = catItems.reduce((s,i) => s + (i.qty * i.unitCost), 0);
    return `<div class="bg-white rounded-lg shadow mb-4 overflow-hidden">
      <div class="bg-gray-50 px-4 py-2 flex justify-between items-center border-b">
        <h3 class="font-semibold text-sm text-gray-700">${cat}</h3>
        <button onclick="addEstItem('${cat}')" class="text-xs bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1 rounded">+ Add Line Item</button>
      </div>
      <table class="w-full text-sm">
        <thead class="text-xs text-gray-500"><tr>
          <th class="px-4 py-2 text-left">Description</th>
          <th class="px-4 py-2 text-right w-20">Qty</th>
          <th class="px-4 py-2 text-center w-20">Unit</th>
          <th class="px-4 py-2 text-right w-28">Unit Cost</th>
          <th class="px-4 py-2 text-right w-28">Total</th>
          <th class="px-4 py-2 w-10"></th>
        </tr></thead>
        <tbody>${catItems.map(i => `<tr class="border-t hover:bg-orange-50/30" id="est-${i.id}">
          <td class="px-4 py-2"><input type="text" value="${escAttr(i.desc)}" class="w-full bg-transparent text-sm" onchange="updEst(${i.id},'desc',this.value)"></td>
          <td class="px-4 py-2"><input type="number" value="${i.qty}" min="0" step="any" class="w-full bg-transparent text-sm text-right" onchange="updEst(${i.id},'qty',this.value)"></td>
          <td class="px-4 py-2"><select class="bg-transparent text-sm text-center w-full" onchange="updEst(${i.id},'unit',this.value)">${UNITS.map(u=>`<option${u===i.unit?' selected':''}>${u}</option>`).join('')}</select></td>
          <td class="px-4 py-2"><input type="number" value="${i.unitCost}" min="0" step="0.01" class="w-full bg-transparent text-sm text-right" onchange="updEst(${i.id},'unitCost',this.value)"></td>
          <td class="px-4 py-2 text-right font-medium">${fmt(i.qty * i.unitCost)}</td>
          <td class="px-4 py-2 text-center"><button onclick="delEst(${i.id})" class="text-gray-300 hover:text-red-500">&times;</button></td>
        </tr>`).join('')}</tbody>
      </table>
      <div class="bg-gray-50 px-4 py-2 text-right text-sm font-semibold text-gray-600 border-t">Subtotal: ${fmt(subtotal)}</div>
    </div>`;
  }).join('');
  calcEstTotals();
}

function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function addEstItem(cat) {
  const items = getEst();
  const newId = items.length ? Math.max(...items.map(i=>i.id)) + 1 : 1;
  items.push({id:newId, cat, desc:'New Item', qty:1, unit:'ea', unitCost:0});
  saveEst(items);
  renderEst();
}

function updEst(id, field, val) {
  const items = getEst();
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (field === 'qty' || field === 'unitCost') val = parseFloat(val) || 0;
  item[field] = val;
  saveEst(items);
  renderEst();
}

function delEst(id) {
  saveEst(getEst().filter(i => i.id !== id));
  renderEst();
}

function calcEstTotals() {
  const items = getEst();
  const subtotal = items.reduce((s,i) => s + (i.qty * i.unitCost), 0);
  const markup = subtotal * (parseFloat(document.getElementById('markupPct').value) || 0) / 100;
  const taxable = subtotal + markup;
  const tax = taxable * (parseFloat(document.getElementById('taxPct').value) || 0) / 100;
  document.getElementById('estSubtotal').textContent = fmt(subtotal);
  document.getElementById('estMarkup').textContent = fmt(markup);
  document.getElementById('estTax').textContent = fmt(tax);
  document.getElementById('estGrand').textContent = fmt(taxable + tax);
}

function aiReview() {
  const items = getEst();
  if (!items.length) { alert('Add some line items first.'); return; }
  const suggestions = [
    'Material cost is 15% above regional average — consider requesting competitive bids.',
    'Labor hours may be underestimated for this scope — similar projects averaged 20% more.',
    'Unit cost appears low relative to current market pricing — verify with latest supplier quotes.',
    'Quantity seems high for the described scope — double-check takeoff measurements.',
    'This line item typically includes mobilization costs — ensure those are accounted for.',
    'Consider adding a contingency line item — industry standard is 5-10% for this project type.'
  ];
  const count = Math.random() < 0.5 ? 1 : 2;
  const shuffled = items.sort(() => 0.5 - Math.random());
  const flagged = shuffled.slice(0, count);
  const usedSuggestions = suggestions.sort(() => 0.5 - Math.random());

  const box = document.getElementById('aiReviewBox');
  box.classList.remove('hidden');
  box.innerHTML = `<div class="flex items-center gap-2 mb-3 font-semibold text-purple-800">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19 14.5"/></svg>
      AI Review Results
    </div>` +
    flagged.map((item, idx) => `<div class="bg-white border border-purple-100 rounded p-3 mb-2">
      <p class="font-medium text-gray-800 text-sm">${escHtml(item.desc)} <span class="text-gray-400">(${item.cat})</span></p>
      <p class="text-purple-700 text-sm mt-1">${usedSuggestions[idx]}</p>
    </div>`).join('') +
    `<p class="text-xs text-gray-500 mt-2">Analysis based on simulated regional cost data. ${items.length - count} line items look within expected ranges.</p>`;
}

// ===== RESET =====
function resetData() {
  if (!confirm('Reset all demo data to defaults?')) return;
  ['construction_projects','construction_change_orders','construction_field_log','construction_estimates'].forEach(k => localStorage.removeItem(k));
  seedData();
  renderCO(); renderLog(); renderEst();
}

// ===== INIT =====
seedData();
renderCO();
</script>
